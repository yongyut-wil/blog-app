name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-update-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/blog-app:${{ github.sha }}

      - name: Update Infrastructure Repo
        run: |
          git clone https://x-access-token:${{ secrets.INFRA_REPO_TOKEN }}@github.com/yongyut-wil/k8s-infra-webapp.git
          cd k8s-infra-webapp
          
          # เปลี่ยน Tag ในไฟล์ frontend.yaml เป็น Commit ล่าสุด
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/blog-app:.*|image: ${{ secrets.DOCKER_USERNAME }}/blog-app:${{ github.sha }}|g" frontend.yaml
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add frontend.yaml
          if ! git diff --cached --quiet; then
            git commit -m "Update frontend image tag to ${{ github.sha }}"
            git push
          else
            echo "No changes to commit"
          fi